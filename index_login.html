<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plannos — Sign in</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --radius: 16px;
      --sans: "Inter", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", sans-serif;
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }
    
    .card {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    
    .head {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 32px 24px 16px;
    }
    
    .logoImg {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      object-fit: contain;
      background: #f9fafb;
      padding: 6px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    
    .head h1 { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .head p { margin: 0; font-size: 14px; color: var(--muted); }

    .body { padding: 16px 32px 32px; }
    
    label { 
      display: block; 
      font-size: 13px; 
      font-weight: 500; 
      color: #374151; 
      margin: 16px 0 6px; 
    }
    
    input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    input::placeholder { color: #9ca3af; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .row { display: flex; gap: 12px; margin-top: 24px; }
    
    button {
      flex: 1;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    #signInBtn {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
    }

    #signInBtn:hover {
      background: var(--accent-hover);
    }

    #signUpBtn {
      background: #ffffff;
      color: #374151;
      border: 1px solid #d1d5db;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    #signUpBtn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    .hint {
      margin-top: 16px; 
      font-size: 13px; 
      color: var(--muted); 
      line-height: 1.5;
      text-align: center;
    }
    
    .err {
      margin-bottom: 10px; 
      padding: 10px; 
      border-radius: 8px; 
      background: #fef2f2; 
      border: 1px solid #fecaca;
      font-size: 13px; 
      color: #ef4444; 
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="head">
      <img src="logo.png" class="logoImg" alt="Plannos logo" />
      <div>
        <h1>Welcome back</h1>
        <p>Sign in to your Plannos account</p>
      </div>
    </div>

    <div class="body">
      <div id="error" class="err"></div>

      <label>Email address</label>
      <input id="authEmail" placeholder="you@example.com" autocomplete="email" />

      <label>Password</label>
      <input id="authPwd" type="password" placeholder="••••••••" autocomplete="current-password" />

      <div class="row">
        <button id="signInBtn">Sign in</button>
        <button id="signUpBtn">Create account</button>
      </div>

      <div class="hint">
        Your account will be created instantly upon signing up.
      </div>
    </div>
  </div>

  <script>
    // ===== Supabase =====
    const SUPABASE_URL = "https://dubfsjioexeiubqwiegt.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_PFIo7-F7m4KrTYHK8RsA0g_TxZJ4sF3";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authEmail = document.getElementById("authEmail");
    const authPwd = document.getElementById("authPwd");
    const signInBtn = document.getElementById("signInBtn");
    const signUpBtn = document.getElementById("signUpBtn");
    const errEl = document.getElementById("error");

    function showErr(msg){
      errEl.textContent = msg;
      errEl.style.display = msg ? "block" : "none";
    }

    // ✅ If already signed in, go to chat
    (async () => {
      const { data } = await sb.auth.getSession();
      if (data.session) window.location.href = "./index.html";
    })();

    signUpBtn.onclick = async () => {
      showErr("");
      const email = authEmail.value.trim();
      const password = authPwd.value;
      if (!email || !password) return showErr("Please enter email + password.");

      const { error } = await sb.auth.signUp({ email, password });
      if (error) return showErr(error.message);

      alert("Sign-up successful. If email confirmation is enabled, please check your inbox.");
    };

    signInBtn.onclick = async () => {
      showErr("");
      const email = authEmail.value.trim();
      const password = authPwd.value;
      if (!email || !password) return showErr("Please enter email + password.");

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) return showErr(error.message);

      window.location.href = "./index.html";
    };
  </script>
</body>
</html>

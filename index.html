<!doctype html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plannos</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    :root {
      --bg: #F8FAFC;         
      --panel: #FFFFFF;      
      --text: #0F172A;      
      --muted: #64748B;      
      --border: #E2E8F0;     
      
      --shadow-sm: 0 1px 2px 0 rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.06), 0 2px 4px -1px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 20px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.01);
      
      --accent: #0F172A;    
      --accent-hover: #334155; 
      --accent-light: #F1F5F9; 
     
      --radius-lg: 12px;
      --radius-xl: 16px;
      
      --sans: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    * { box-sizing: border-box; }
    
    body { 
      margin: 0; 
      font-family: var(--sans); 
      background: var(--bg); 
      color: var(--text); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 24px; 
    }

    .shell { 
      width: min(1200px, 100%); 
      display: grid; 
      grid-template-columns: 280px 1fr; 
      gap: 24px; 
    }

    @media (max-width: 980px){ 
      .shell { grid-template-columns: 1fr; } 
    }

    .sidebar { display: flex; flex-direction: column; gap: 16px; max-height: 85vh; overflow-y: auto; padding-right: 4px; }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 4px; }

    .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); overflow: hidden; flex-shrink: 0; }

    .brand { display: flex; align-items: center; gap: 14px; padding: 20px 24px; border-bottom: 1px solid var(--border); background: #ffffff; }
    .logo { width: 40px; height: 40px; object-fit: contain; border-radius: 10px; background: var(--accent-light); padding: 8px; }
    .brand h1 { font-size: 18px; font-weight: 700; margin: 0; color: #111827; letter-spacing: -0.02em; }
    .brand p { margin: 4px 0 0 0; font-size: 13px; color: var(--muted); }

    .info-section { padding: 20px 24px; }
    .info-section h3 { margin: 0 0 16px 0; font-size: 13px; font-weight: 700; color: #111827; text-transform: uppercase; letter-spacing: 0.05em; }
    
    .filter-group { margin-bottom: 16px; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-group label.group-title { font-size: 12px; font-weight: 600; color: #4B5563; margin-bottom: 8px; display: block; }
    
    .filter-group select, .filter-group input[type="text"], .filter-group input[type="date"] { 
      width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); 
      font-family: var(--sans); font-size: 13px; color: #111827; background: #F8FAFC; outline: none; transition: border-color 0.2s; 
    }
    .filter-group select:focus, .filter-group input[type="text"]:focus, .filter-group input[type="date"]:focus { border-color: #111827; background: #ffffff; }
    .filter-group input::placeholder { color: #9CA3AF; }

    .sidebar-mode-selector { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-mode-selector label { cursor: pointer; }
    .sidebar-mode-selector input[type="radio"] { display: none; }
    .sidebar-mode-selector span { display: block; padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--muted); background: var(--bg); border-radius: 8px; border: 1px solid var(--border); transition: all 0.2s ease; }
    .sidebar-mode-selector input[type="radio"]:checked + span { background: #111827; color: #ffffff; border-color: #111827; font-weight: 600; box-shadow: var(--shadow-sm); }

    .date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;}
    .date-row span { font-size: 12px; color: var(--muted); width: 36px; font-weight: 500;}

    .slider-row { display: flex; align-items: center; gap: 12px; }
    .slider-row input[type="range"] { flex: 1; accent-color: #111827; cursor: pointer; }
    .slider-row .val-display { font-weight: 700; color: #111827; font-size: 14px; min-width: 20px; text-align: right;}

    .main { display: flex; flex-direction: column; height: 85vh; min-height: 600px; box-shadow: var(--shadow-lg); }

    .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); z-index: 10; }
    .toolbar .title b { font-size: 16px; font-weight: 600; color: #111827; }
    .toolbar .title span { font-size: 13px; color: var(--muted); margin-top: 2px; display: block;}
    
    .actions button { appearance: none; border: 1px solid var(--border); background: #ffffff; color: #374151; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s ease; box-shadow: var(--shadow-sm); }
    .actions button:hover { background: #F9FAFB; border-color: #D1D5DB; }

    .chat { padding: 24px; flex: 1; min-height: 0; overflow-y: auto; scroll-behavior: smooth; background: #ffffff; }

    .row { display: flex; gap: 12px; margin: 20px 0; }
    .row.user { justify-content: flex-end; }
    .row.bot { justify-content: flex-start; }

    .bubble { max-width: min(780px, 90%); padding: 16px 20px; border-radius: var(--radius-lg); line-height: 1.6; font-size: 14.5px; }
    .user .bubble { background: #F3F4F6; color: #111827; border-bottom-right-radius: 4px; }
    .bot .bubble { background: #ffffff; color: #1F2937; }

    .composer-container { padding: 16px 24px 20px 24px; background: linear-gradient(180deg, rgba(255,255,255,0) 0%, #ffffff 20%); }

    .composer { position: relative; display: flex; align-items: flex-end; background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius-xl); box-shadow: 0 2px 6px rgba(0,0,0,0.05); transition: box-shadow 0.2s ease, border-color 0.2s ease; }
    .composer:focus-within { border-color: #93C5FD; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08); }

    textarea { flex: 1; resize: none; height: 54px !important; min-height: 54px !important; max-height: 150px !important; padding: 16px 54px 16px 20px; background: transparent; border: none; outline: none; font-size: 15px; line-height: 1.5; font-family: var(--sans); color: #111827; }
    textarea::placeholder { color: #9CA3AF; }

    .send { position: absolute; right: 10px; bottom: 10px; background: var(--accent); color: #fff; border: none; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
    .send svg { width: 16px; height: 16px; fill: currentColor; }
    .send:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.05); }
    .send:disabled { background: #D1D5DB; cursor: not-allowed; transform: none; }

    .statusText { font-size: 12px; color: #9CA3AF; text-align: center; margin-top: 10px; }

    .bubble p { margin: 0 0 12px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1, .bubble h2, .bubble h3 { color: #111827; font-weight: 600; margin-top: 24px; margin-bottom: 12px; }
    .bubble h3 { font-size: 1.1em; }
    .bubble ul, .bubble ol { margin: 12px 0; padding-left: 24px; }
    .bubble li { margin: 6px 0; }
    .bubble a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .bubble a:hover { text-decoration: underline; }
    .bubble strong { color: #111827; }
    
    .map-box { width: 100%; height: 300px; margin: 20px 0; border-radius: 12px; border: 1px solid var(--border); z-index: 1; box-shadow: var(--shadow-sm); }

    .welcome.bubble { background: transparent; border: none; padding: 0; max-width: 100%; }
    .welcome-header { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 8px; letter-spacing: -0.02em;}
    .welcome-sub { font-size: 16px; color: #4B5563; margin-bottom: 24px; }
    .suggestion-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    .suggestion-card { background: #ffffff; border: 1px solid var(--border); padding: 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; text-decoration: none; display: block; }
    .suggestion-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08); transform: translateY(-2px); }
    .suggestion-card .icon { font-size: 20px; margin-bottom: 8px; display: block;}
    .suggestion-card .text { font-size: 14px; color: #374151; font-weight: 500; line-height: 1.4; }

    .typing-indicator { display: flex; gap: 5px; padding: 8px 4px; align-items: center; }
    .typing-indicator span { width: 6px; height: 6px; background: #9CA3AF; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

  </style>
</head>

<body>
  <div class="shell">
    <div class="sidebar">
      
      <div class="card">
        <div class="brand">
          <img src="logo.png" class="logo" alt="Plannos logo" onerror="this.style.display='none'" />
          <div>
            <h1>Plannos</h1>
            <p>Your Planning Assistant</p>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="info-section">
          <h3>Search Configuration</h3>
          
          <div class="filter-group">
            <label class="group-title">🔍 Search Mode</label>
            <div class="sidebar-mode-selector">
              <label><input type="radio" name="search_mode" value="comprehensive" checked> <span>✨ Comprehensive</span></label>
              <label><input type="radio" name="search_mode" value="policy"> <span>📖 Policy</span></label>
              <label><input type="radio" name="search_mode" value="application"> <span>🏛️ Application</span></label>
            </div>
          </div>

          <div class="filter-group">
            <label class="group-title">📍 Target Postcode</label>
            <input type="text" id="globalPostcode" list="postcode-options" placeholder="Type postcode... (e.g. EC2Y)" autocomplete="off">
            <datalist id="postcode-options">
              <option value="EC2Y 9AZ">Example: EC2Y 9AZ</option>
            </datalist>
          </div>

          <div class="filter-group" style="margin-bottom: 0;">
            <label class="group-title">📊 Fetch Count</label>
            <div class="slider-row">
              <input type="range" id="nearbyCount" min="1" max="10" value="3" oninput="document.getElementById('nearbyVal').innerText=this.value">
              <span class="val-display" id="nearbyVal">3</span>
            </div>
          </div>

        </div>
      </div>

      <div class="card">
        <div class="info-section">
          <h3>Global Filters</h3>
          
          <div class="filter-group">
            <label class="group-title">🕒 Date Range</label>
            <div class="date-row">
              <span>From</span>
              <input type="text" id="dateFrom" placeholder="Select start date...">
            </div>
            <div class="date-row">
              <span>To</span>
              <input type="text" id="dateTo" placeholder="Select end date...">
            </div>
            <div style="text-align: right; margin-top: 6px;">
              <a href="#" style="font-size: 11px; color: var(--accent); text-decoration: none; font-weight: 500;" onclick="document.getElementById('dateFrom').value=''; document.getElementById('dateTo').value=''; return false;">Clear Dates</a>
            </div>
          </div>

          <div class="filter-group" style="margin-bottom: 0;">
            <label class="group-title">📏 Max Distance</label>
            <select id="distanceFilter">
              <option value="all">No Limit (Find nearest)</option>
              <option value="0.2">Within 0.2 Miles</option>
              <option value="0.5">Within 0.5 Miles</option>
              <option value="1">Within 1.0 Mile</option>
              <option value="3">Within 3.0 Miles</option>
            </select>
          </div>
        </div>
      </div>
      
    </div>

    <div class="card main">
      <div class="toolbar">
        <div class="title">
          <b>Chat</b>
          <span id="sub">Ready to answer your planning queries</span>
        </div>
        <div class="actions">
          <button id="clearBtn" title="Start a new conversation">New Chat</button>
          <button id="logoutBtn">Sign out</button>
        </div>
      </div>

      <div id="chat" class="chat"></div>

      <div class="composer-container">
        <div class="composer">
          <textarea id="msg" placeholder="Ask about a property, postcode, or council policy..."></textarea>
          <button class="send" id="sendBtn" title="Send message">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="statusText" id="statusText">AI can make mistakes. Verify important planning information.</div>
      </div>
    </div>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    // ⚠️ 记得修改为最新的 Modal 部署链接
    const API_BASE = "https://xchengcode--plannos-unified-geo-bot-fastapi-app-dev.modal.run"; 

    const chatEl = document.getElementById("chat");
    const msgEl = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusText = document.getElementById("statusText");

    let lastAssistantText = "";
    let isSending = false;

    // ==========================================
    // 🚀 核心黑科技：云端邮编联想 (Postcode Autocomplete)
    // ==========================================
    const globalPostcodeEl = document.getElementById("globalPostcode");
    const postcodeOptionsEl = document.getElementById("postcode-options");
    let postcodeTimeout = null;

    globalPostcodeEl.addEventListener("input", (e) => {
      const val = e.target.value.trim();
      
      // 只有当用户输入了至少 2 个字符时，才触发云端联想
      if (val.length < 2) return; 

      clearTimeout(postcodeTimeout);
      
      // 加入 300 毫秒的防抖(Debounce)，防止用户打字太快引发过多的 API 请求
      postcodeTimeout = setTimeout(async () => {
        try {
          const res = await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(val)}/autocomplete`);
          if (res.ok) {
            const data = await res.json();
            if (data.result && data.result.length > 0) {
              // 瞬间清空旧选项，并植入最新联想出来的合法邮编
              postcodeOptionsEl.innerHTML = ""; 
              data.result.forEach(pc => {
                const opt = document.createElement("option");
                opt.value = pc;
                postcodeOptionsEl.appendChild(opt);
              });
            }
          }
        } catch (err) {
          console.error("Postcode autocomplete API failed", err);
        }
      }, 300); 
    });
    // ==========================================


    function addMessage(role, text, { html = false, markdown = false } = {}) {
      const row = document.createElement("div");
      row.className = "row " + role;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      const raw = (text || "").trim();

      if (html) bubble.innerHTML = raw;
      else if (markdown) bubble.innerHTML = marked.parse(raw);
      else bubble.textContent = raw;

      row.appendChild(bubble);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
      return bubble;
    }

    function setSending(on){
      isSending = on;
      sendBtn.disabled = on;
      msgEl.disabled = on;
      statusText.textContent = on ? "Analyzing data and applying filters..." : "AI can make mistakes. Verify important planning information.";
      
      document.querySelectorAll('input[name="search_mode"]').forEach(radio => radio.disabled = on);
      document.getElementById("nearbyCount").disabled = on;
      document.getElementById("globalPostcode").disabled = on;
      document.getElementById("dateFrom").disabled = on;
      document.getElementById("dateTo").disabled = on;
      document.getElementById("distanceFilter").disabled = on;
    }

    async function send(){
      const msg = msgEl.value.trim();
      if (!msg || isSending) return;

      msgEl.value = "";
      msgEl.style.height = '54px';

      const selectedMode = document.querySelector('input[name="search_mode"]:checked').value;
      const selectedNearbyCount = parseInt(document.getElementById("nearbyCount").value, 10);
      const globalPostcode = document.getElementById("globalPostcode").value.trim();
      const dateFrom = document.getElementById("dateFrom").value;
      const dateTo = document.getElementById("dateTo").value;
      const distanceFilter = document.getElementById("distanceFilter").value;

      addMessage("user", msg);

      const bubble = addMessage("bot", "");
      bubble.innerHTML = `<div class='text-content'><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
      const textContainer = bubble.querySelector('.text-content');

      lastAssistantText = "";
      setSending(true);

      try{
        const res = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            message: msg, 
            conversation_id: "web", 
            mode: selectedMode,
            nearby_count: selectedNearbyCount,
            postcode: globalPostcode,
            date_from: dateFrom,
            date_to: dateTo,
            distance_filter: distanceFilter 
          })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while(true){
          const {value, done} = await reader.read();
          if(done) break;
          buffer += decoder.decode(value, {stream:true});

          const parts = buffer.split("\n\n");
          buffer = parts.pop();

          for(const p of parts){
            if(!p.startsWith("data: ")) continue;
            const evt = JSON.parse(p.slice(6));
            
            if(evt.type === "delta"){
              lastAssistantText += evt.text;
              textContainer.innerHTML = marked.parse(lastAssistantText);
              chatEl.scrollTop = chatEl.scrollHeight;
            } 
            else if (evt.type === "map") {
              const mapData = evt.data;
              const mapId = 'map-' + Date.now();
              
              const mapDiv = document.createElement('div');
              mapDiv.className = 'map-box';
              mapDiv.id = mapId;
              bubble.appendChild(mapDiv);

              setTimeout(() => {
                const map = L.map(mapId).setView([mapData.target.lat, mapData.target.lon], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19, attribution: '&copy; CARTO' }).addTo(map);

                const redIcon = new L.Icon({
                  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                  shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                  iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                });

                L.marker([mapData.target.lat, mapData.target.lon], {icon: redIcon}).addTo(map).bindPopup("<b>Target Location:</b><br>" + mapData.target.label).openPopup();

                mapData.markers.forEach(m => {
                    let searchUrl = m.url || `https://www.google.com/search?q=${encodeURIComponent(m.council + ' planning application ' + m.app_id)}`;
                    const popupHtml = `
                      <div style="font-family: var(--sans);">
                        <b style="color: #111827; font-size: 13px;">Historical Case</b><br>
                        <span style="color: #4B5563; font-size: 12px;">${m.label}</span><br>
                        <a href="${searchUrl}" target="_blank" style="display: inline-block; margin-top: 8px; color: var(--accent); font-size: 12px; font-weight: 600; text-decoration: none;">View Official Record ↗</a>
                      </div>
                    `;
                    L.marker([m.lat, m.lon]).addTo(map).bindPopup(popupHtml);
                });
                chatEl.scrollTop = chatEl.scrollHeight;
              }, 100);
            }
          }
        }
      } catch(err){
        textContainer.innerHTML = "Error connecting to Plannos AI. Please try again.";
      } finally{
        setSending(false);
      }
    }

    sendBtn.addEventListener("click", send);
    
    msgEl.addEventListener('input', function() { this.style.height = '54px'; this.style.height = (this.scrollHeight) + 'px'; });
    msgEl.addEventListener("keydown", (e)=>{ if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); send(); } });

    function showWelcome() {
      chatEl.innerHTML = "";
      const welcomeBubble = addMessage("bot", `
      <div class="welcome-header">Hello! How can I help with your property?</div>
      <div class="welcome-sub">I'm your AI planning assistant. I can navigate local policies and find nearby approved projects.</div>
      <div class="suggestion-grid">
        <a href="#" class="suggestion-card" data-example="Are there any nearby applications for roof extensions? What does the local policy say about it?">
          <span class="icon">🏡</span><span class="text">Find roof extension precedents</span>
        </a>
        <a href="#" class="suggestion-card" data-example="What is the local policy on carbon reduction targets, and are there recent approved examples?">
          <span class="icon">🌱</span><span class="text">Explain carbon reduction policy</span>
        </a>
        <a href="#" class="suggestion-card" data-example="Show me all applications related to basement excavations within a 0.5-mile radius.">
          <span class="icon">📊</span><span class="text">Find nearby basement cases</span>
        </a>
      </div>
      `, { html: true });
      welcomeBubble.classList.add("welcome");
    }

    clearBtn.addEventListener("click", showWelcome);

    chatEl.addEventListener("click", (e) => {
      const card = e.target.closest(".suggestion-card");
      if (card) { e.preventDefault(); msgEl.value = card.dataset.example; msgEl.style.height = 'auto'; msgEl.focus(); return; }
    });

    showWelcome();

    const dateConfig = {
      dateFormat: "Y-m-d", // 保持传给后端的格式依然是 YYYY-MM-DD
      allowInput: true,
      disableMobile: "true" // 在手机上也强制使用这个好看的英文日历
    };
    const fpFrom = flatpickr("#dateFrom", dateConfig);
    const fpTo = flatpickr("#dateTo", dateConfig);

    // 修改清空按钮的逻辑，使其能清空插件的缓存
    document.querySelector('a[onclick*="dateFrom"]').onclick = function(e) {
      e.preventDefault();
      fpFrom.clear();
      fpTo.clear();
    };

    // ===== Supabase Auth =====
    const SUPABASE_URL = "https://dubfsjioexeiubqwiegt.supabase.co";
